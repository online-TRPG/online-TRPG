# /docker-compose.yml

# 공용 로그 드라이버 설정 (json-file, 서비스당 최대 30MB)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # 1. Nginx (웹 서버 & 프록시) — FE 정적파일을 이미지에 포함 (멀티스테이지 빌드)
  nginx:
    build:
      context: .
      dockerfile: ./infra/nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # default.conf 만 런타임 마운트 (설정 변경 시 이미지 재빌드 없이 reload 가능)
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt ACME 챌린지 경로 (/.well-known/acme-challenge/) 공유
      - ./infra/certbot/www:/var/www/certbot:ro
      # 발급된 인증서 읽기 전용 마운트
      - ./infra/certbot/conf:/etc/letsencrypt:ro
    environment:
      TZ: Asia/Seoul
    # 6시간마다 nginx reload 해서 갱신된 인증서를 반영
    command:
      - /bin/sh
      - -c
      - |
        while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"
    depends_on:
      backend:
        condition: service_started
      ai-server:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 2. NestJS 백엔드
  backend:
    build:
      context: . # 중요: 루트에서 빌드해야 shared-types를 읽을 수 있음
      dockerfile: ./be/Dockerfile
    expose:
      - "8080" # 외부(포트포워딩)로는 막고, 내부 Nginx하고만 8080으로 소통
    env_file:
      - .env.backend
    environment:
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 3. FastAPI AI
  ai-server:
    build:
      context: .
      dockerfile: ./ai/Dockerfile
    expose:
      - "8000"
    env_file:
      - .env.ai
    environment:
      TZ: Asia/Seoul
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 4. Ollama 로컬 LLM
  ollama:
    image: ollama/ollama:latest
    ports:
      # 외부 노출을 막고 호스트 로컬에서만 접근 가능하도록 바인딩
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      TZ: Asia/Seoul
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 5. PostgreSQL
  postgres:
    image: postgres:16-alpine
    expose:
      - "5432" # 내부 네트워크에서만 접근, 외부 노출 없음
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 6a. Certbot — Let's Encrypt 인증서 자동 갱신 (12시간 주기 체크)
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    environment:
      TZ: Asia/Seoul
    # 컨테이너 시작 시 즉시 renew 시도 후 12시간마다 반복
    entrypoint:
      - /bin/sh
      - -c
      - |
        trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

  # 7. Redis (비밀번호 보호, 영속화)
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    environment:
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  ollama_data:
  postgres_data:
  redis_data:
