# /docker-compose.yml

# 공용 로그 드라이버 설정 (json-file, 서비스당 최대 30MB)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # 1. Nginx (웹 서버 & 프록시) — FE 정적파일 + 설정 모두 이미지에 포함
  # 인증서·ACME 챌린지는 certbot 과 named volume 으로 공유 (host bind mount 없음 → DooD 안전)
  nginx:
    build:
      context: .
      dockerfile: ./infra/nginx/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # ACME 챌린지 경로 — certbot 이 쓰고 nginx 가 서빙
      - certbot_www:/var/www/certbot:ro
      # Let's Encrypt 인증서 — certbot 이 발급/갱신, nginx 가 읽음
      - certbot_conf:/etc/letsencrypt:ro
    environment:
      TZ: Asia/Seoul
      NGINX_DOMAIN: k14a201.p.ssafy.io
    # 기동 직후 select-config 1회 실행 후, 6시간마다 재평가→reload (HTTP→HTTPS 자동 전환)
    # nginx 공식 entrypoint 는 CMD[0]==nginx 일 때만 /docker-entrypoint.d/* 를 돌리므로 직접 호출
    command:
      - /bin/sh
      - -c
      - |
        /docker-entrypoint.d/40-select-config.sh
        while :; do
          sleep 6h & wait $${!}
          /docker-entrypoint.d/40-select-config.sh
          nginx -s reload
        done &
        nginx -g "daemon off;"
    depends_on:
      backend:
        condition: service_started
      ai-server:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 2. NestJS 백엔드
  backend:
    build:
      context: . # 중요: 루트에서 빌드해야 shared-types를 읽을 수 있음
      dockerfile: ./be/Dockerfile
    expose:
      - "8080" # 외부(포트포워딩)로는 막고, 내부 Nginx하고만 8080으로 소통
    env_file:
      - .env.backend
    environment:
      TZ: Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:8080/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 3. FastAPI AI (Google AI Studio 게이트)
  ai-server:
    build:
      context: .
      dockerfile: ./ai/Dockerfile
    expose:
      - "8000"
    env_file:
      - .env.ai
    environment:
      TZ: Asia/Seoul
    # urllib 사용 (curl 미설치 슬림 이미지). ai-server 가 startup 시 google-genai 초기화로 시간 걸릴 수 있어 start_period 30s.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/internal/ai/health').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 4. PostgreSQL
  postgres:
    image: postgres:16-alpine
    expose:
      - "5432" # 내부 네트워크에서만 접근, 외부 노출 없음
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Jenkins 가 prisma db push 직전 pg_dump 떨구는 named volume.
      # --accept-data-loss 사고 시 이 dump 로 pg_restore. 절차는 RUNBOOK 참조.
      - db_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

  # 5a. Certbot — Let's Encrypt 인증서 자동 갱신 (12시간 주기 체크)
  # 최초 발급은 수동 1회 필요:
  #   docker compose run --rm --entrypoint "" certbot \
  #     certbot certonly --webroot -w /var/www/certbot \
  #     -d k14a201.p.ssafy.io --email <ADMIN_EMAIL> --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    environment:
      TZ: Asia/Seoul
    # 컨테이너 시작 시 즉시 renew 시도 후 12시간마다 반복
    entrypoint:
      - /bin/sh
      - -c
      - |
        trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;
    depends_on:
      nginx:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

  # 6. Redis (비밀번호 보호, 영속화)
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    environment:
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
  db_backups:
