# /infra/nginx/default.conf
#
# 현재 파일은 [Phase 1: 초기 HTTP-only + ACME 챌린지 서빙] 구성.
# Let's Encrypt 인증서 발급 직후 `default-ssl.conf` 의 내용으로 교체(같은 경로 덮어쓰기)해야 HTTPS 활성화됨.
# 교체 후 `docker compose exec nginx nginx -s reload` 로 리로드.

server {
    listen 80;
    server_name k14a201.p.ssafy.io;

    # 업로드/큰 요청 바디 허용 (기본 1MB → 20MB)
    client_max_body_size 20M;

    # Let's Encrypt HTTP-01 챌린지 경로 (certbot 이 이 경로에 임시 파일을 생성하고 검증)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 1. 프론트엔드 (React 빌드 파일 서빙)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # SPA 라우팅을 위한 설정 (새로고침 시 404 방지)
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API 라우팅 (NestJS)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 지원을 위한 헤더 설정 (실시간 게임 통신용)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 3. AI 서버 라우팅 (FastAPI)
    location /ai/ {
        proxy_pass http://ai-server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
