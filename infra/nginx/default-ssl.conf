# /infra/nginx/default-ssl.conf
#
# [Phase 2: HTTPS 활성화 구성] — Let's Encrypt 인증서 발급 후 이 파일의 내용을
# `default.conf` 로 복사(덮어쓰기)한 뒤 `docker compose exec nginx nginx -s reload` 실행.
# 인증서가 없는 상태에서 이 설정을 쓰면 nginx 기동 실패함.

# ---------------- HTTP (80) ----------------
# ACME 챌린지만 허용, 나머지 트래픽은 HTTPS 로 리다이렉트
server {
    listen 80;
    server_name k14a201.p.ssafy.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------- HTTPS (443) ----------------
server {
    listen 443 ssl;
    http2 on;
    server_name k14a201.p.ssafy.io;

    # Let's Encrypt 발급 인증서
    ssl_certificate     /etc/letsencrypt/live/k14a201.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/k14a201.p.ssafy.io/privkey.pem;

    # 권장 SSL 설정 (Mozilla Intermediate 기준)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 20M;

    # 1. 프론트엔드 (React 빌드 파일 서빙)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. 백엔드 API 라우팅 (NestJS)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 3. 백엔드 WebSocket (Socket.IO) — polling/websocket 모두 동일 경로
    location /socket.io/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # 4. AI 서버 라우팅 (FastAPI)
    location /ai/ {
        proxy_pass http://ai-server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
