<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- 앤틱 금색 4방향 뾰족별 (나침반 로즈) 모서리 장식 -->
  <!-- 외곽 별: 짙은 금 -->
  <polygon
    points="12,0 14.2,9.8 24,12 14.2,14.2 12,24 9.8,14.2 0,12 9.8,9.8"
    fill="#b07d28"
  />
  <!-- 중간 별: 밝은 금 -->
  <polygon
    points="12,4 13.8,10.2 20,12 13.8,13.8 12,20 10.2,13.8 4,12 10.2,10.2"
    fill="#e8c97a"
  />
  <!-- 내부 별: 다시 짙은 금 -->
  <polygon
    points="12,7 13,11 17,12 13,13 12,17 11,13 7,12 11,11"
    fill="#c9922a"
  />
  <!-- 중심 원: 어두운 갈색 (앤틱 리벳 느낌) -->
  <circle cx="12" cy="12" r="2.5" fill="#3e2208"/>
  <!-- 중심 하이라이트 -->
  <circle cx="11" cy="11" r="0.8" fill="rgba(255,230,150,0.6)"/>
</svg>
