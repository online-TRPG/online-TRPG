<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120" preserveAspectRatio="none">
  <!--
    앤틱 골드 패널 프레임 에셋
    ─────────────────────────────────────────────────
    사용법: CSS background-image 또는 <img> 태그에서 사용.
    preserveAspectRatio="none" → 임의 크기로 stretch 가능.

    구성:
      1. 배경 양피지 그라디언트
      2. 외곽 이중선 액자 (짙은 금 + 밝은 금)
      3. 4모서리 뾰족별 장식
  -->

  <defs>
    <!-- 양피지 배경 그라디언트 -->
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fdfaf3"/>
      <stop offset="100%" stop-color="#f8f0da"/>
    </linearGradient>

    <!-- 금색 그라디언트 (테두리용) -->
    <linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8a6020"/>
      <stop offset="30%"  stop-color="#e8c97a"/>
      <stop offset="70%"  stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#8a6020"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8a6020"/>
      <stop offset="30%"  stop-color="#e8c97a"/>
      <stop offset="70%"  stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#8a6020"/>
    </linearGradient>

    <!-- 뾰족별 심볼 (재사용) -->
    <symbol id="star" viewBox="0 0 24 24" width="24" height="24">
      <polygon
        points="12,0 14.2,9.8 24,12 14.2,14.2 12,24 9.8,14.2 0,12 9.8,9.8"
        fill="#b07d28"
      />
      <polygon
        points="12,4 13.8,10.2 20,12 13.8,13.8 12,20 10.2,13.8 4,12 10.2,10.2"
        fill="#e8c97a"
      />
      <polygon
        points="12,7 13,11 17,12 13,13 12,17 11,13 7,12 11,11"
        fill="#c9922a"
      />
      <circle cx="12" cy="12" r="2.5" fill="#3e2208"/>
      <circle cx="11" cy="11" r="0.8" fill="rgba(255,230,150,0.55)"/>
    </symbol>
  </defs>

  <!-- 1. 양피지 배경 -->
  <rect x="0" y="0" width="200" height="120" fill="url(#parchment)"/>

  <!-- 2. 외곽 짙은 금 테두리 (외선) -->
  <rect x="1"  y="1"  width="198" height="118" fill="none" stroke="#8a6020" stroke-width="1.5"/>

  <!-- 3. 내부 밝은 금 테두리 (내선 — 이중 액자 효과) -->
  <rect x="4"  y="4"  width="192" height="112" fill="none" stroke="rgba(232,201,122,0.7)" stroke-width="1"/>

  <!-- 4. 수평 테두리에 골드 그라디언트 오버레이 -->
  <rect x="1"  y="1"  width="198" height="2"   fill="url(#goldH)" opacity="0.8"/>
  <rect x="1"  y="117" width="198" height="2"  fill="url(#goldH)" opacity="0.8"/>

  <!-- 5. 수직 테두리에 골드 그라디언트 오버레이 -->
  <rect x="1"  y="1"  width="2"   height="118" fill="url(#goldV)" opacity="0.8"/>
  <rect x="197" y="1" width="2"   height="118" fill="url(#goldV)" opacity="0.8"/>

  <!-- 6. 4모서리 뾰족별 장식 (각 모서리 중심에 배치) -->
  <!-- 좌상 -->
  <use href="#star" x="-12" y="-12"/>
  <!-- 우상 -->
  <use href="#star" x="188" y="-12"/>
  <!-- 좌하 -->
  <use href="#star" x="-12" y="108"/>
  <!-- 우하 -->
  <use href="#star" x="188" y="108"/>
</svg>
